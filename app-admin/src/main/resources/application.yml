spring:
  application:
    name: gotomongol-admin
  datasource:
    url: jdbc:h2:file:./data/gotomongol;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 9090

upload:
  path: ./uploads
