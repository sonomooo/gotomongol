<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>견적 관리 - Admin</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 2rem; background: #f5f5f5; }
        h1 { margin-bottom: 1.5rem; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        th, td { padding: 0.8rem 1rem; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #333; color: white; }
        .status-PENDING { color: #f59e0b; }
        .status-QUOTED { color: #3b82f6; }
        .status-CONFIRMED { color: #10b981; }
        .status-CANCELLED { color: #ef4444; }
        select { padding: 0.3rem; border-radius: 4px; }
        button { padding: 0.3rem 0.8rem; background: #333; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>📋 견적 요청 관리</h1>
    <table>
        <thead>
            <tr>
                <th>ID</th><th>이름</th><th>연락처</th><th>일수</th><th>인원</th><th>스팟</th><th>상태</th><th>변경</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="q : ${quotes}">
                <td th:text="${q.id}">1</td>
                <td th:text="${q.customerName}">홍길동</td>
                <td th:text="${q.phone}">010-0000-0000</td>
                <td th:text="${q.days} + '일'">5일</td>
                <td th:text="${q.groupSize} + '명'">2명</td>
                <td th:text="${#strings.listJoin(q.spots, ', ')}">홉스골</td>
                <td th:classappend="'status-' + ${q.status}" th:text="${q.status}">PENDING</td>
                <td>
                    <form th:action="@{/admin/quotes/{id}/status(id=${q.id})}" method="post" style="display:flex;gap:0.3rem;">
                        <select name="status">
                            <option value="PENDING">대기</option>
                            <option value="QUOTED">견적완료</option>
                            <option value="CONFIRMED">확정</option>
                            <option value="CANCELLED">취소</option>
                        </select>
                        <button type="submit">변경</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
