<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>커스텀 투어 만들기 - 몽골 투어</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; color: #333; background: #f9f9f9; }
        .container { max-width: 700px; margin: 2rem auto; padding: 2rem; background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        h1 { text-align: center; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; font-weight: bold; margin-bottom: 0.5rem; }
        input, select, textarea { width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 0.8rem; }
        .checkbox-group label { font-weight: normal; display: flex; align-items: center; gap: 0.3rem; }
        .checkbox-group input { width: auto; }
        .btn { display: block; width: 100%; padding: 1rem; background: #ff6b35; color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        .btn:hover { background: #e55a2b; }
        a { color: #ff6b35; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🇲🇳 나만의 몽골 투어 설계</h1>
        <form method="post" action="/custom">
            <div class="form-group">
                <label>이름 *</label>
                <input type="text" name="customerName" required>
            </div>
            <div class="form-group">
                <label>연락처 *</label>
                <input type="tel" name="phone" required placeholder="010-0000-0000">
            </div>
            <div class="form-group">
                <label>이메일</label>
                <input type="email" name="email">
            </div>
            <div class="form-group">
                <label>여행 일수 *</label>
                <select name="days" required>
                    <option value="3">3일</option>
                    <option value="5" selected>5일</option>
                    <option value="7">7일</option>
                    <option value="10">10일 이상</option>
                </select>
            </div>
            <div class="form-group">
                <label>인원 *</label>
                <select name="groupSize" required>
                    <option value="2">2명</option>
                    <option value="4">4명</option>
                    <option value="6">6명 이상</option>
                </select>
            </div>
            <div class="form-group">
                <label>희망 출발일</label>
                <input type="date" name="preferredDate">
            </div>
            <div class="form-group">
                <label>가고 싶은 곳 (복수 선택)</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="spots" value="홉스골 호수"> 홉스골 호수</label>
                    <label><input type="checkbox" name="spots" value="고비사막"> 고비사막</label>
                    <label><input type="checkbox" name="spots" value="테를지 국립공원"> 테를지 국립공원</label>
                    <label><input type="checkbox" name="spots" value="오르혼 폭포"> 오르혼 폭포</label>
                    <label><input type="checkbox" name="spots" value="쳉헤르 온천"> 쳉헤르 온천</label>
                    <label><input type="checkbox" name="spots" value="미니사막"> 미니사막</label>
                    <label><input type="checkbox" name="spots" value="울란바토르 시내"> 울란바토르 시내</label>
                </div>
            </div>
            <div class="form-group">
                <label>하고 싶은 활동 (복수 선택)</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="activities" value="승마"> 승마</label>
                    <label><input type="checkbox" name="activities" value="낙타"> 낙타</label>
                    <label><input type="checkbox" name="activities" value="독수리 체험"> 독수리 체험</label>
                    <label><input type="checkbox" name="activities" value="게르 숙박"> 게르 숙박</label>
                    <label><input type="checkbox" name="activities" value="유목민 홈스테이"> 유목민 홈스테이</label>
                    <label><input type="checkbox" name="activities" value="별보기/은하수"> 별보기/은하수</label>
                    <label><input type="checkbox" name="activities" value="온천"> 온천</label>
                </div>
            </div>
            <div class="form-group">
                <label>숙소 등급 *</label>
                <select name="accommodationType" required>
                    <option value="CAMP">캠프 (기본)</option>
                    <option value="PREMIUM_CAMP">프리미엄 캠프</option>
                    <option value="HOTEL_MIX">호텔 혼합</option>
                </select>
            </div>
            <div class="form-group">
                <label>추가 요청사항</label>
                <textarea name="memo" rows="3" placeholder="특별히 원하시는 것이 있으면 적어주세요"></textarea>
            </div>
            <button type="submit" class="btn">견적 요청하기</button>
        </form>
        <p style="text-align:center; margin-top:1rem; color:#666;">24시간 내 맞춤 일정표와 가격을 보내드립니다</p>
    </div>
</body>
</html>
