<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>견적 요청 완료</title>
    <style>
        body { font-family: 'Pretendard', -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f9f9f9; }
        .card { text-align: center; background: white; padding: 3rem; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .card h1 { margin-bottom: 1rem; }
        .card p { color: #666; margin-bottom: 1.5rem; }
        a { color: #ff6b35; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1>✅ 견적 요청이 접수되었습니다!</h1>
        <p>24시간 내 카카오톡 또는 이메일로 맞춤 일정표와 가격을 보내드립니다.</p>
        <a href="/">홈으로 돌아가기</a>
    </div>
</body>
</html>
