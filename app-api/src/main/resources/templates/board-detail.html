<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${post.title} + ' - 고투몽골'">게시글</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background: #f9f9f9; padding: 2rem 1rem; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 2.5rem; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .back { color: #666; text-decoration: none; display: block; margin-bottom: 1.5rem; }
        h1 { margin-bottom: 1.5rem; font-size: 1.5rem; }
        .content { line-height: 1.8; font-size: 1rem; }
        .content img { max-width: 100%; border-radius: 8px; margin: 1rem 0; }
        .hero-img { width: 100%; max-height: 300px; object-fit: cover; border-radius: 8px; margin-bottom: 1.5rem; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/board" class="back">← 게시판</a>
        <img th:if="${post.imageUrl != null}" th:src="${post.imageUrl}" class="hero-img">
        <h1 th:text="${post.title}">제목</h1>
        <div class="content" th:utext="${post.content}">내용</div>
    </div>
</body>
</html>
