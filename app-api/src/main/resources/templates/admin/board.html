<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시판 관리 - Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
        .sidebar { position: fixed; left: 0; top: 0; width: 220px; height: 100vh; background: #16213e; padding: 2rem 1rem; }
        .sidebar h2 { color: #ff6b35; margin-bottom: 2rem; font-size: 1.1rem; }
        .sidebar a { display: block; color: #aaa; text-decoration: none; padding: 0.7rem 1rem; border-radius: 6px; margin-bottom: 0.3rem; }
        .sidebar a:hover, .sidebar a.active { background: #0f3460; color: white; }
        .main { margin-left: 220px; padding: 2rem; }
        .form-box { background: #16213e; padding: 1.5rem; border-radius: 8px; margin-bottom: 2rem; }
        label { display: block; color: #aaa; font-size: 0.85rem; margin-bottom: 0.3rem; }
        input, select, textarea { width: 100%; padding: 0.5rem; border: 1px solid #0f3460; border-radius: 4px; background: #1a1a2e; color: #eee; margin-bottom: 0.8rem; }
        textarea { resize: vertical; }
        button { padding: 0.5rem 1rem; background: #ff6b35; color: white; border: none; border-radius: 4px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; background: #16213e; border-radius: 8px; overflow: hidden; }
        th, td { padding: 0.7rem 1rem; text-align: left; border-bottom: 1px solid #0f3460; font-size: 0.9rem; }
        th { background: #0f3460; }
        .btn-del { background: #ef4444; font-size: 0.8rem; padding: 0.3rem 0.6rem; }
        .hamburger { display: none; }
        @media (max-width: 768px) {
            .sidebar { display: none; } .sidebar.open { display: block; }
            .main { margin-left: 0; padding: 1rem; }
            .hamburger { display: block; position: fixed; top: 1rem; right: 1rem; z-index: 101; background: #ff6b35; color: white; border: none; border-radius: 6px; padding: 0.5rem 0.8rem; font-size: 1.2rem; cursor: pointer; }
        }
    </style>
</head>
<body>
    <button class="hamburger" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>
    <div class="sidebar">
        <h2>🇲🇳 GoToMongol</h2>
        <div style="display:flex;gap:0.5rem;margin-bottom:1rem;"><a href="?lang=ko" style="color:#aaa;font-size:0.8rem;">🇰🇷</a><a href="?lang=mn" style="color:#aaa;font-size:0.8rem;">🇲🇳</a></div>
        <a href="/admin">대시보드</a>
        <a href="/admin/quotes">견적 관리</a>
        <a href="/admin/trips">여행 관리</a>
        <a href="/admin/tours">투어 상품 관리</a>
        <a href="/admin/board" class="active">게시판 관리</a>
        <a href="/admin/catalog">카탈로그 관리</a>
        <a href="/admin/pricing">가격 설정</a>
        <a href="/admin/site">사이트 설정</a>
    </div>
    <div class="main">
        <h1 style="margin-bottom:1.5rem;">📝 게시판 관리</h1>

        <div class="form-box">
            <h3 style="margin-bottom:1rem;">새 게시글 작성</h3>
            <form action="/admin/board" method="post" enctype="multipart/form-data">
                <label>카테고리</label>
                <select name="category">
                    <option value="NOTICE">공지사항</option>
                    <option value="WELCOME">몽골로 오세요</option>
                    <option value="SPOT_INFO">관광지</option>
                    <option value="ACTIVITY_INFO">활동</option>
                </select>
                <label>제목</label>
                <input type="text" name="title" required>
                <label>내용 (HTML 가능)</label>
                <textarea name="content" rows="6" required></textarea>
                <label>대표 이미지 (선택)</label>
                <input type="file" name="image" accept="image/*">
                <button type="submit">등록</button>
            </form>
        </div>

        <table>
            <thead><tr><th>ID</th><th>카테고리</th><th>제목</th><th></th></tr></thead>
            <tbody>
                <tr th:each="p : ${posts}">
                    <td th:text="${p.id}">1</td>
                    <td th:text="${p.category}">NOTICE</td>
                    <td th:text="${p.title}">제목</td>
                    <td><form th:action="@{/admin/board/{id}/delete(id=${p.id})}" method="post"><button type="submit" class="btn-del">삭제</button></form></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
