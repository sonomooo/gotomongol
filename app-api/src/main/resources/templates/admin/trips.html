<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>여행 관리 - Admin</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 2rem; background: #f5f5f5; }
        h1 { margin-bottom: 1.5rem; }
        .form-box { background: white; padding: 1.5rem; border-radius: 8px; margin-bottom: 2rem; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .form-box h2 { margin-bottom: 1rem; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 0.8rem; }
        label { font-weight: bold; font-size: 0.85rem; display: block; margin-bottom: 0.3rem; }
        input, textarea, select { width: 100%; padding: 0.5rem; border: 1px solid #ddd; border-radius: 4px; }
        textarea { resize: vertical; }
        button { padding: 0.6rem 1.5rem; background: #333; color: white; border: none; border-radius: 4px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        th, td { padding: 0.7rem 1rem; text-align: left; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        th { background: #333; color: white; }
        .msg { padding: 0.8rem; background: #d1fae5; border-radius: 4px; margin-bottom: 1rem; display: none; }
    </style>
</head>
<body>
    <h1>🗂️ 확정 여행 관리</h1>

    <div class="form-box">
        <h2>새 여행 등록</h2>
        <div class="msg" id="msg"></div>
        <div class="form-row">
            <div><label>유저 ID</label><input type="number" id="userId"></div>
            <div><label>투어명</label><input type="text" id="tourName"></div>
        </div>
        <div class="form-row">
            <div><label>출발일</label><input type="date" id="startDate"></div>
            <div><label>종료일</label><input type="date" id="endDate"></div>
        </div>
        <div class="form-row">
            <div><label>인원</label><input type="number" id="groupSize" value="2"></div>
            <div><label>방문지</label><input type="text" id="spots" placeholder="홉스골, 온천, 초원"></div>
        </div>
        <div style="margin-bottom:0.8rem;">
            <label>집결 안내</label>
            <input type="text" id="meetingInfo" placeholder="울란바토르 공항 1층, 오전 9시">
        </div>
        <div style="margin-bottom:0.8rem;">
            <label>일자별 일정</label>
            <textarea id="dailySchedule" rows="6" placeholder="1일차: 울란바토르 → 테를지&#10;2일차: 승마 체험&#10;3일차: ..."></textarea>
        </div>
        <div style="margin-bottom:0.8rem;">
            <label>가이드 메모 (비공개)</label>
            <textarea id="guideNote" rows="2"></textarea>
        </div>
        <button onclick="submitTrip()">등록</button>
    </div>

    <h2>등록된 여행</h2>
    <table>
        <thead><tr><th>ID</th><th>유저ID</th><th>투어명</th><th>기간</th><th>인원</th><th>상태</th></tr></thead>
        <tbody>
            <tr th:each="t : ${trips}">
                <td th:text="${t.id}">1</td>
                <td th:text="${t.userId}">1</td>
                <td th:text="${t.tourName}">홉스골</td>
                <td th:text="${t.startDate} + ' ~ ' + ${t.endDate}">7/10~7/16</td>
                <td th:text="${t.groupSize}">4</td>
                <td th:text="${t.status}">UPCOMING</td>
            </tr>
        </tbody>
    </table>

    <script>
        async function submitTrip() {
            const body = {
                userId: parseInt(document.getElementById('userId').value),
                tourName: document.getElementById('tourName').value,
                startDate: document.getElementById('startDate').value,
                endDate: document.getElementById('endDate').value,
                groupSize: parseInt(document.getElementById('groupSize').value),
                spots: document.getElementById('spots').value,
                dailySchedule: document.getElementById('dailySchedule').value,
                meetingInfo: document.getElementById('meetingInfo').value || null,
                guideNote: document.getElementById('guideNote').value || null
            };
            const res = await fetch('/admin/trips', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
            const data = await res.json();
            const msg = document.getElementById('msg');
            msg.textContent = data.message; msg.style.display = 'block';
            setTimeout(() => location.reload(), 1000);
        }
    </script>
</body>
</html>
