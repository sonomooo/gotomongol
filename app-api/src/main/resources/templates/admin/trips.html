<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>여행 관리 - Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
        .sidebar { position: fixed; left: 0; top: 0; width: 220px; height: 100vh; background: #16213e; padding: 2rem 1rem; }
        .sidebar h2 { color: #ff6b35; margin-bottom: 2rem; font-size: 1.1rem; }
        .sidebar a { display: block; color: #aaa; text-decoration: none; padding: 0.7rem 1rem; border-radius: 6px; margin-bottom: 0.3rem; }
        .sidebar a:hover, .sidebar a.active { background: #0f3460; color: white; }
        .main { margin-left: 220px; padding: 2rem; }
        .form-box { background: #16213e; padding: 1.5rem; border-radius: 8px; margin-bottom: 2rem; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 0.8rem; }
        label { font-size: 0.85rem; color: #aaa; display: block; margin-bottom: 0.3rem; }
        input, textarea, select { width: 100%; padding: 0.5rem; border: 1px solid #0f3460; border-radius: 4px; background: #1a1a2e; color: #eee; }
        textarea { resize: vertical; }
        button { padding: 0.6rem 1.5rem; background: #ff6b35; color: white; border: none; border-radius: 4px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; background: #16213e; border-radius: 8px; overflow: hidden; }
        th, td { padding: 0.7rem 1rem; text-align: left; border-bottom: 1px solid #0f3460; font-size: 0.9rem; }
        th { background: #0f3460; }
        a { color: #ff6b35; text-decoration: none; }
        .msg { padding: 0.8rem; background: #064e3b; border-radius: 4px; margin-bottom: 1rem; display: none; }
            @media (max-width: 768px) {
            .sidebar { display: none; position: fixed; z-index: 100; width: 100%; height: auto; padding: 1rem; }
            .sidebar.open { display: block; }
            .main { margin-left: 0; padding: 1rem; }
            .hamburger { display: block; position: fixed; top: 1rem; right: 1rem; z-index: 101; background: #ff6b35; color: white; border: none; border-radius: 6px; padding: 0.5rem 0.8rem; font-size: 1.2rem; cursor: pointer; }
            table { font-size: 0.8rem; }
            .form-row { grid-template-columns: 1fr !important; }
            .tour-grid { grid-template-columns: 1fr !important; }
            .cards { grid-template-columns: 1fr !important; }
        }
        .hamburger { display: none; }
    </style>
</head>
<body>
    <button class="hamburger" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>
    <div class="sidebar">
        <h2>🇲🇳 고투몽골 Admin</h2>
        <a href="/admin">대시보드</a>
        <a href="/admin/quotes">견적 관리</a>
        <a href="/admin/trips" class="active">여행 관리</a>
        <a href="/admin/tours">투어 상품 관리</a>
        <a href="/admin/site">사이트 설정</a>
    </div>
    <div class="main">
        <h1 style="margin-bottom:1.5rem;">🗂️ 여행 관리</h1>
        <div class="form-box">
            <h3 style="margin-bottom:1rem;">새 여행 등록</h3>
            <div class="msg" id="msg"></div>
            <div class="form-row">
                <div><label>유저 ID</label><input type="number" id="userId"></div>
                <div><label>투어명</label><input type="text" id="tourName"></div>
            </div>
            <div class="form-row">
                <div><label>출발일</label><input type="date" id="startDate"></div>
                <div><label>종료일</label><input type="date" id="endDate"></div>
            </div>
            <div class="form-row">
                <div><label>인원</label><input type="number" id="groupSize" value="2"></div>
                <div><label>방문지</label><input type="text" id="spots" placeholder="홉스골, 온천"></div>
            </div>
            <div style="margin-bottom:0.8rem;"><label>집결 안내</label><input type="text" id="meetingInfo"></div>
            <div style="margin-bottom:0.8rem;"><label>일자별 일정</label><textarea id="dailySchedule" rows="5"></textarea></div>
            <div style="margin-bottom:0.8rem;"><label>가이드 메모 (비공개)</label><textarea id="guideNote" rows="2"></textarea></div>
            <button onclick="submitTrip()">등록</button>
        </div>

        <h3 style="margin-bottom:1rem;">등록된 여행</h3>
        <table>
            <thead><tr><th>ID</th><th>유저ID</th><th>투어명</th><th>기간</th><th>인원</th><th>상태</th><th></th></tr></thead>
            <tbody>
                <tr th:each="t : ${trips}">
                    <td th:text="${t.id}">1</td>
                    <td th:text="${t.userId}">1</td>
                    <td th:text="${t.tourName}">홉스골</td>
                    <td th:text="${t.startDate} + ' ~ ' + ${t.endDate}">7/10~7/16</td>
                    <td th:text="${t.groupSize}">4</td>
                    <td th:text="${t.status}">UPCOMING</td>
                    <td><a th:href="@{/admin/trips/{id}(id=${t.id})}">상세</a></td>
                </tr>
            </tbody>
        </table>
    </div>
    <script>
        async function submitTrip() {
            const body = { userId: parseInt(document.getElementById('userId').value), tourName: document.getElementById('tourName').value, startDate: document.getElementById('startDate').value, endDate: document.getElementById('endDate').value, groupSize: parseInt(document.getElementById('groupSize').value), spots: document.getElementById('spots').value, dailySchedule: document.getElementById('dailySchedule').value, meetingInfo: document.getElementById('meetingInfo').value || null, guideNote: document.getElementById('guideNote').value || null };
            const res = await fetch('/admin/trips', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
            const data = await res.json();
            document.getElementById('msg').textContent = data.message; document.getElementById('msg').style.display = 'block';
            setTimeout(() => location.reload(), 1000);
        }
    </script>
</body>
</html>
