<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가격 설정 - Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
        .sidebar { position: fixed; left: 0; top: 0; width: 220px; height: 100vh; background: #16213e; padding: 2rem 1rem; }
        .sidebar h2 { color: #ff6b35; margin-bottom: 2rem; font-size: 1.1rem; }
        .sidebar a { display: block; color: #aaa; text-decoration: none; padding: 0.7rem 1rem; border-radius: 6px; margin-bottom: 0.3rem; }
        .sidebar a:hover, .sidebar a.active { background: #0f3460; color: white; }
        .main { margin-left: 220px; padding: 2rem; }
        table { width: 100%; border-collapse: collapse; background: #16213e; border-radius: 8px; overflow: hidden; margin-bottom: 2rem; }
        th, td { padding: 0.7rem 1rem; text-align: left; border-bottom: 1px solid #0f3460; font-size: 0.9rem; }
        th { background: #0f3460; }
        .form-box { background: #16213e; padding: 1.5rem; border-radius: 8px; margin-bottom: 2rem; }
        .form-row { display: grid; grid-template-columns: 1fr 2fr 1fr 1fr auto; gap: 0.8rem; align-items: end; }
        label { font-size: 0.8rem; color: #aaa; display: block; margin-bottom: 0.3rem; }
        input, select { width: 100%; padding: 0.5rem; border: 1px solid #0f3460; border-radius: 4px; background: #1a1a2e; color: #eee; }
        button { padding: 0.5rem 1rem; background: #ff6b35; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .btn-del { background: #ef4444; font-size: 0.8rem; padding: 0.3rem 0.6rem; }
        .hamburger { display: none; }
        @media (max-width: 768px) {
            .sidebar { display: none; position: fixed; z-index: 100; width: 100%; height: auto; padding: 1rem; }
            .sidebar.open { display: block; }
            .main { margin-left: 0; padding: 1rem; }
            .hamburger { display: block; position: fixed; top: 1rem; right: 1rem; z-index: 101; background: #ff6b35; color: white; border: none; border-radius: 6px; padding: 0.5rem 0.8rem; font-size: 1.2rem; cursor: pointer; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <button class="hamburger" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>
    <div class="sidebar">
        <h2>🇲🇳 GoToMongol</h2>
        <div style="display:flex;gap:0.5rem;margin-bottom:1rem;"><a href="?lang=ko" style="color:#aaa;font-size:0.8rem;">🇰🇷 한국어</a><a href="?lang=mn" style="color:#aaa;font-size:0.8rem;">🇲🇳 Монгол</a></div>
        <a href="/admin" th:text="#{admin.dashboard}">대시보드</a>
        <a href="/admin/quotes" th:text="#{admin.quotes}">견적 관리</a>
        <a href="/admin/trips" th:text="#{admin.trips}">여행 관리</a>
        <a href="/admin/tours" th:text="#{admin.tours}">투어 상품 관리</a>
        <a href="/admin/catalog">카탈로그 관리</a>
        <a href="/admin/pricing" class="active" th:text="#{admin.pricing}">가격 설정</a>
        <a href="/admin/site" th:text="#{admin.site}">사이트 설정</a>
    </div>
    <div class="main">
        <h1 style="margin-bottom:1.5rem;" th:text="#{admin.pricing}">💰 가격 설정</h1>
        <p style="color:#aaa; margin-bottom:1.5rem;">항목별 가격을 설정하면 고객이 견적 요청 시 예상 금액이 자동 계산됩니다.</p>

        <div class="form-box">
            <h3 style="margin-bottom:1rem;">항목 추가</h3>
            <div class="form-row">
                <div><label th:text="#{admin.category}">카테고리</label><select id="category"><option value="BASE">기본</option><option value="SPOT">방문지</option><option value="ACTIVITY">액티비티</option><option value="ACCOMMODATION">숙소</option></select></div>
                <div><label th:text="#{admin.itemName}">항목명</label><input type="text" id="itemName" placeholder="예: 차량+기사, 홉스골 호수, 승마"></div>
                <div><label>가격 (원)</label><input type="number" id="pricePerUnit" placeholder="180000"></div>
                <div><label th:text="#{admin.unit}">단위</label><input type="text" id="unit" value="1일" placeholder="1일, 1회"></div>
                <div><label>&nbsp;</label><button onclick="addConfig()">추가</button></div>
            </div>
        </div>

        <table>
            <thead><tr><th th:text="#{admin.category}">카테고리</th><th th:text="#{admin.itemName}">항목명</th><th th:text="#{admin.price}">가격</th><th th:text="#{admin.unit}">단위</th><th></th></tr></thead>
            <tbody>
                <tr th:each="c : ${configs}">
                    <td th:text="${c.category}">BASE</td>
                    <td th:text="${c.itemName}">차량+기사</td>
                    <td th:text="${#numbers.formatInteger(c.pricePerUnit, 0, 'COMMA')} + '원'">180,000원</td>
                    <td th:text="${c.unit}">1일</td>
                    <td><form th:action="@{/admin/pricing/{id}/delete(id=${c.id})}" method="post" style="display:inline;"><button type="submit" class="btn-del">삭제</button></form></td>
                </tr>
            </tbody>
        </table>
    </div>
    <script>
        async function addConfig() {
            const body = {
                category: document.getElementById('category').value,
                itemName: document.getElementById('itemName').value,
                pricePerUnit: parseInt(document.getElementById('pricePerUnit').value),
                unit: document.getElementById('unit').value
            };
            await fetch('/admin/pricing', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
            location.reload();
        }
    </script>
</body>
</html>
