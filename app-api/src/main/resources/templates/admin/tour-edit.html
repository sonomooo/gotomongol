<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>투어 편집 - Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
        .sidebar { position: fixed; left: 0; top: 0; width: 220px; height: 100vh; background: #16213e; padding: 2rem 1rem; }
        .sidebar h2 { color: #ff6b35; margin-bottom: 2rem; font-size: 1.1rem; }
        .sidebar a { display: block; color: #aaa; text-decoration: none; padding: 0.7rem 1rem; border-radius: 6px; margin-bottom: 0.3rem; }
        .sidebar a:hover, .sidebar a.active { background: #0f3460; color: white; }
        .main { margin-left: 220px; padding: 2rem; max-width: 800px; }
        .form-box { background: #16213e; padding: 2rem; border-radius: 8px; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; color: #aaa; font-size: 0.85rem; margin-bottom: 0.4rem; }
        input, textarea, select { width: 100%; padding: 0.6rem; border: 1px solid #0f3460; border-radius: 4px; background: #1a1a2e; color: #eee; font-size: 0.95rem; }
        textarea { resize: vertical; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .btn { padding: 0.8rem 2rem; background: #ff6b35; color: white; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; }
        .btn:hover { background: #e55a2b; }
        .preview { max-width: 300px; border-radius: 8px; margin-top: 0.5rem; }
        a { color: #ff6b35; text-decoration: none; }
        .upload-area { border: 2px dashed #0f3460; border-radius: 8px; padding: 1.5rem; text-align: center; cursor: pointer; }
        .upload-area:hover { border-color: #ff6b35; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>🇲🇳 고투몽골 Admin</h2>
        <a href="/admin">대시보드</a>
        <a href="/admin/quotes">견적 관리</a>
        <a href="/admin/trips">여행 관리</a>
        <a href="/admin/tours" class="active">투어 상품 관리</a>
    </div>
    <div class="main">
        <a href="/admin/tours">← 목록</a>
        <div class="form-box" style="margin-top:1rem;">
            <h2 style="margin-bottom:1.5rem;" th:text="'✏️ ' + ${tour.name} + ' 편집'">투어 편집</h2>
            <form th:action="@{/admin/tours/{id}(id=${tour.id})}" method="post" enctype="multipart/form-data">
                <div class="form-group">
                    <label>대표 이미지</label>
                    <label for="imageInput" class="upload-area">
                        <p>📷 클릭하여 이미지 업로드 (JPG, PNG)</p>
                    </label>
                    <input type="file" name="image" id="imageInput" accept="image/*" style="display:none;" onchange="previewImage(this)">
                    <img th:if="${tour.imageUrl != null}" th:src="${tour.imageUrl}" class="preview" id="previewImg">
                    <img th:if="${tour.imageUrl == null}" class="preview" id="previewImg" style="display:none;">
                </div>
                <div class="form-group">
                    <label>투어명</label>
                    <input type="text" name="name" th:value="${tour.name}" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>여행 일수</label>
                        <input type="number" name="days" th:value="${tour.days}" required>
                    </div>
                    <div class="form-group">
                        <label>최소 가격 (원)</label>
                        <input type="number" name="minPrice" th:value="${tour.minPrice}" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>최대 가격 (원)</label>
                        <input type="number" name="maxPrice" th:value="${tour.maxPrice}" required>
                    </div>
                    <div class="form-group">
                        <label>방문지 (쉼표 구분)</label>
                        <input type="text" name="spots" th:value="${#strings.listJoin(tour.spots, ', ')}">
                    </div>
                </div>
                <div class="form-group">
                    <label>액티비티 (쉼표 구분)</label>
                    <input type="text" name="activities" th:value="${#strings.listJoin(tour.activities, ', ')}">
                </div>
                <div class="form-group">
                    <label>간단 설명</label>
                    <textarea name="description" rows="2" th:text="${tour.description}"></textarea>
                </div>
                <div class="form-group">
                    <label>상세 설명 (HTML 가능)</label>
                    <textarea name="detailContent" rows="10" th:text="${tour.detailContent}"></textarea>
                </div>
                <button type="submit" class="btn">저장</button>
            </form>
        </div>
    </div>
    <script>
        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    const img = document.getElementById('previewImg');
                    img.src = e.target.result;
                    img.style.display = 'block';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</body>
</html>
