<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>여행 상세 - Admin</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 2rem; background: #f5f5f5; }
        .card { background: white; padding: 2rem; border-radius: 8px; max-width: 700px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        h1 { margin-bottom: 1.5rem; }
        .field { margin-bottom: 1rem; }
        .field label { font-weight: bold; color: #666; font-size: 0.85rem; display: block; margin-bottom: 0.3rem; }
        .field p { background: #fafafa; padding: 0.6rem; border-radius: 4px; white-space: pre-wrap; }
        .meta { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
        a { color: #ff6b35; text-decoration: none; }
        .note { background: #fff3cd; padding: 0.8rem; border-radius: 4px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <a href="/admin/trips">← 목록으로</a>
    <div class="card" style="margin-top:1rem;">
        <h1 th:text="${trip.tourName}">홉스골 투어</h1>
        <div class="meta">
            <div class="field"><label>유저 ID</label><p th:text="${trip.userId}">1</p></div>
            <div class="field"><label>인원</label><p th:text="${trip.groupSize} + '명'">4명</p></div>
            <div class="field"><label>기간</label><p th:text="${trip.startDate} + ' ~ ' + ${trip.endDate}">7/10~7/16</p></div>
            <div class="field"><label>상태</label><p th:text="${trip.status}">UPCOMING</p></div>
        </div>
        <div class="field"><label>방문지</label><p th:text="${trip.spots}">홉스골</p></div>
        <div class="field"><label>집결 안내</label><p th:text="${trip.meetingInfo ?: '미정'}">공항 1층</p></div>
        <div class="field"><label>일자별 일정</label><p th:text="${trip.dailySchedule}">1일차: ...</p></div>
        <div class="field" th:if="${trip.guideNote != null}">
            <label>가이드 메모 (비공개)</label>
            <p class="note" th:text="${trip.guideNote}">메모</p>
        </div>
    </div>
</body>
</html>
