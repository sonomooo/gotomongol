<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>여행 상세 - Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
        .sidebar { position: fixed; left: 0; top: 0; width: 220px; height: 100vh; background: #16213e; padding: 2rem 1rem; }
        .sidebar h2 { color: #ff6b35; margin-bottom: 2rem; font-size: 1.1rem; }
        .sidebar a { display: block; color: #aaa; text-decoration: none; padding: 0.7rem 1rem; border-radius: 6px; margin-bottom: 0.3rem; }
        .sidebar a:hover, .sidebar a.active { background: #0f3460; color: white; }
        .main { margin-left: 220px; padding: 2rem; }
        .card { background: #16213e; padding: 2rem; border-radius: 8px; max-width: 700px; }
        .field { margin-bottom: 1.2rem; }
        .field label { color: #aaa; font-size: 0.85rem; display: block; margin-bottom: 0.3rem; }
        .field p { background: #1a1a2e; padding: 0.6rem; border-radius: 4px; white-space: pre-wrap; }
        .note { background: #78350f; padding: 0.6rem; border-radius: 4px; }
        a { color: #ff6b35; text-decoration: none; }
            .hamburger { display: none; }
        @media (max-width: 768px) {
            .sidebar { display: none; position: fixed; z-index: 100; width: 100%; height: auto; padding: 1rem; }
            .sidebar.open { display: block; }
            .main { margin-left: 0; padding: 1rem; }
            .hamburger { display: block; position: fixed; top: 1rem; right: 1rem; z-index: 101; background: #ff6b35; color: white; border: none; border-radius: 6px; padding: 0.5rem 0.8rem; font-size: 1.2rem; cursor: pointer; }
            table { font-size: 0.8rem; }
            .form-row { grid-template-columns: 1fr !important; }
            .tour-grid { grid-template-columns: 1fr !important; }
            .cards { grid-template-columns: 1fr !important; }
        }

    </style>
</head>
<body>
    <button class="hamburger" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>
    <div class="sidebar">
        <h2>🇲🇳 GoToMongol</h2>
        <div style="display:flex;gap:0.5rem;margin-bottom:1rem;"><a href="?lang=ko" style="color:#aaa;font-size:0.8rem;">🇰🇷 한국어</a><a href="?lang=mn" style="color:#aaa;font-size:0.8rem;">🇲🇳 Монгол</a></div>
        <a href="/admin" th:text="#{admin.dashboard}">대시보드</a>
        <a href="/admin/quotes" th:text="#{admin.quotes}">견적 관리</a>
        <a href="/admin/trips" class="active" th:text="#{admin.trips}">여행 관리</a>
        <a href="/admin/tours" th:text="#{admin.tours}">투어 상품 관리</a>
        <a href="/admin/catalog">카탈로그 관리</a>
        <a href="/admin/pricing" th:text="#{admin.pricing}">가격 설정</a>
        <a href="/admin/site" th:text="#{admin.site}">사이트 설정</a>
    </div>
    <div class="main">
        <a href="/admin/trips">← 목록</a>
        <div class="card" style="margin-top:1rem;">
            <h1 th:text="${trip.tourName}" style="color:#ff6b35; margin-bottom:1.5rem;">투어명</h1>
            <div class="field"><label>유저 ID</label><p th:text="${trip.userId}">1</p></div>
            <div class="field"><label>기간</label><p th:text="${trip.startDate} + ' ~ ' + ${trip.endDate}">7/10~7/16</p></div>
            <div class="field"><label>인원</label><p th:text="${trip.groupSize} + '명'">4명</p></div>
            <div class="field"><label>방문지</label><p th:text="${trip.spots}">홉스골</p></div>
            <div class="field"><label>집결 안내</label><p th:text="${trip.meetingInfo ?: '미정'}">공항</p></div>
            <div class="field"><label>일자별 일정</label><p th:text="${trip.dailySchedule}">1일차...</p></div>
            <div class="field" th:if="${trip.guideNote != null}"><label>가이드 메모</label><p class="note" th:text="${trip.guideNote}">메모</p></div>
        </div>
    </div>
</body>
</html>
