<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>견적 관리 - Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
        .sidebar { position: fixed; left: 0; top: 0; width: 220px; height: 100vh; background: #16213e; padding: 2rem 1rem; }
        .sidebar h2 { color: #ff6b35; margin-bottom: 2rem; font-size: 1.1rem; }
        .sidebar a { display: block; color: #aaa; text-decoration: none; padding: 0.7rem 1rem; border-radius: 6px; margin-bottom: 0.3rem; }
        .sidebar a:hover, .sidebar a.active { background: #0f3460; color: white; }
        .main { margin-left: 220px; padding: 2rem; }
        table { width: 100%; border-collapse: collapse; background: #16213e; border-radius: 8px; overflow: hidden; }
        th, td { padding: 0.7rem 1rem; text-align: left; border-bottom: 1px solid #0f3460; font-size: 0.9rem; }
        th { background: #0f3460; }
        .status-PENDING { color: #f59e0b; }
        .status-QUOTED { color: #3b82f6; }
        .status-CONFIRMED { color: #10b981; }
        .status-CANCELLED { color: #ef4444; }
        select, button { padding: 0.3rem 0.5rem; border-radius: 4px; border: none; }
        button { background: #ff6b35; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>🇲🇳 고투몽골 Admin</h2>
        <a href="/admin">대시보드</a>
        <a href="/admin/quotes" class="active">견적 관리</a>
        <a href="/admin/trips">여행 관리</a>
        <a href="/admin/tours">투어 상품 관리</a>
    </div>
    <div class="main">
        <h1 style="margin-bottom:1.5rem;">📋 견적 관리</h1>
        <table>
            <thead><tr><th>ID</th><th>이름</th><th>연락처</th><th>일수</th><th>인원</th><th>스팟</th><th>숙소</th><th>메모</th><th>상태</th><th>변경</th></tr></thead>
            <tbody>
                <tr th:each="q : ${quotes}">
                    <td th:text="${q.id}">1</td>
                    <td th:text="${q.customerName}">홍길동</td>
                    <td th:text="${q.phone}">010-0000</td>
                    <td th:text="${q.days} + '일'">5일</td>
                    <td th:text="${q.groupSize} + '명'">2명</td>
                    <td th:text="${#strings.listJoin(q.spots, ', ')}">홉스골</td>
                    <td th:text="${q.accommodationType}">CAMP</td>
                    <td th:text="${q.memo}">-</td>
                    <td th:classappend="'status-' + ${q.status}" th:text="${q.status}">PENDING</td>
                    <td>
                        <form th:action="@{/quotes/{id}/status(id=${q.id})}" method="post" style="display:flex;gap:0.3rem;">
                            <select name="status">
                                <option value="PENDING">대기</option>
                                <option value="QUOTED">견적완료</option>
                                <option value="CONFIRMED">확정</option>
                                <option value="CANCELLED">취소</option>
                            </select>
                            <button type="submit">변경</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
