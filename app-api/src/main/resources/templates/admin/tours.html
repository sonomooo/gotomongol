<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>투어 상품 관리 - Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
        .sidebar { position: fixed; left: 0; top: 0; width: 220px; height: 100vh; background: #16213e; padding: 2rem 1rem; }
        .sidebar h2 { color: #ff6b35; margin-bottom: 2rem; font-size: 1.1rem; }
        .sidebar a { display: block; color: #aaa; text-decoration: none; padding: 0.7rem 1rem; border-radius: 6px; margin-bottom: 0.3rem; }
        .sidebar a:hover, .sidebar a.active { background: #0f3460; color: white; }
        .main { margin-left: 220px; padding: 2rem; }
        .tour-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; }
        .tour-card { background: #16213e; border-radius: 12px; overflow: hidden; }
        .tour-card img { width: 100%; height: 160px; object-fit: cover; background: #0f3460; }
        .tour-card .no-img { width: 100%; height: 160px; background: #0f3460; display: flex; align-items: center; justify-content: center; color: #666; }
        .tour-card .info { padding: 1rem; }
        .tour-card h3 { margin-bottom: 0.3rem; }
        .tour-card .price { color: #ff6b35; font-weight: bold; }
        .tour-card .actions { display: flex; gap: 0.5rem; margin-top: 0.8rem; }
        .tour-card .actions a, .tour-card .actions button { padding: 0.4rem 0.8rem; border-radius: 4px; font-size: 0.8rem; text-decoration: none; border: none; cursor: pointer; }
        .btn-edit { background: #3b82f6; color: white; }
        .btn-toggle { background: #6b7280; color: white; }
        .inactive { opacity: 0.5; }
            .hamburger { display: none; }
        @media (max-width: 768px) {
            .sidebar { display: none; position: fixed; z-index: 100; width: 100%; height: auto; padding: 1rem; }
            .sidebar.open { display: block; }
            .main { margin-left: 0; padding: 1rem; }
            .hamburger { display: block; position: fixed; top: 1rem; right: 1rem; z-index: 101; background: #ff6b35; color: white; border: none; border-radius: 6px; padding: 0.5rem 0.8rem; font-size: 1.2rem; cursor: pointer; }
            table { font-size: 0.8rem; }
            .form-row { grid-template-columns: 1fr !important; }
            .tour-grid { grid-template-columns: 1fr !important; }
            .cards { grid-template-columns: 1fr !important; }
        }

    </style>
</head>
<body>
    <button class="hamburger" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>
    <div class="sidebar">
        <h2>🇲🇳 GoToMongol</h2>
        <div style="display:flex;gap:0.5rem;margin-bottom:1rem;"><a href="?lang=ko" style="color:#aaa;font-size:0.8rem;">🇰🇷 한국어</a><a href="?lang=mn" style="color:#aaa;font-size:0.8rem;">🇲🇳 Монгол</a></div>
        <a href="/admin" th:text="#{admin.dashboard}">대시보드</a>
        <a href="/admin/quotes" th:text="#{admin.quotes}">견적 관리</a>
        <a href="/admin/trips" th:text="#{admin.trips}">여행 관리</a>
        <a href="/admin/tours" th:text="#{admin.tours}">투어 상품 관리</a>
        <a href="/admin/pricing" th:text="#{admin.pricing}">가격 설정</a>
        <a href="/admin/site" th:text="#{admin.site}">사이트 설정</a>
    </div>
    <div class="main">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
            <h1 th:text="#{admin.tours}">🏔️ 투어 상품 관리</h1>
            <button onclick="document.getElementById('addForm').style.display='block'" style="padding:0.6rem 1.2rem; background:#ff6b35; color:white; border:none; border-radius:6px; cursor:pointer;">+ 새 상품 추가</button>
        </div>

        <!-- 새 상품 추가 폼 -->
        <div id="addForm" style="display:none; background:#16213e; padding:1.5rem; border-radius:8px; margin-bottom:2rem;">
            <h3 style="margin-bottom:1rem;">새 투어 상품</h3>
            <form action="/admin/tours/new" method="post" enctype="multipart/form-data">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:0.8rem;">
                    <div><label style="color:#aaa; font-size:0.85rem;">투어명</label><input type="text" name="name" required style="width:100%; padding:0.5rem; border:1px solid #0f3460; border-radius:4px; background:#1a1a2e; color:#eee;"></div>
                    <div><label style="color:#aaa; font-size:0.85rem;">일수</label><input type="number" name="days" value="5" required style="width:100%; padding:0.5rem; border:1px solid #0f3460; border-radius:4px; background:#1a1a2e; color:#eee;"></div>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:0.8rem;">
                    <div><label style="color:#aaa; font-size:0.85rem;">최소 가격</label><input type="number" name="minPrice" value="800000" required style="width:100%; padding:0.5rem; border:1px solid #0f3460; border-radius:4px; background:#1a1a2e; color:#eee;"></div>
                    <div><label style="color:#aaa; font-size:0.85rem;">최대 가격</label><input type="number" name="maxPrice" value="1000000" required style="width:100%; padding:0.5rem; border:1px solid #0f3460; border-radius:4px; background:#1a1a2e; color:#eee;"></div>
                </div>
                <div style="margin-bottom:0.8rem;"><label style="color:#aaa; font-size:0.85rem;">설명</label><input type="text" name="description" required style="width:100%; padding:0.5rem; border:1px solid #0f3460; border-radius:4px; background:#1a1a2e; color:#eee;"></div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:0.8rem;">
                    <div><label style="color:#aaa; font-size:0.85rem;">방문지 (쉼표 구분)</label><input type="text" name="spots" style="width:100%; padding:0.5rem; border:1px solid #0f3460; border-radius:4px; background:#1a1a2e; color:#eee;"></div>
                    <div><label style="color:#aaa; font-size:0.85rem;">액티비티 (쉼표 구분)</label><input type="text" name="activities" style="width:100%; padding:0.5rem; border:1px solid #0f3460; border-radius:4px; background:#1a1a2e; color:#eee;"></div>
                </div>
                <div style="margin-bottom:0.8rem;"><label style="color:#aaa; font-size:0.85rem;">대표 이미지</label><input type="file" name="image" accept="image/*" style="color:#aaa;"></div>
                <button type="submit" style="padding:0.6rem 1.5rem; background:#ff6b35; color:white; border:none; border-radius:4px; cursor:pointer;">추가</button>
            </form>
        </div>

        <div class="tour-grid">
            <div th:each="tour : ${tours}" class="tour-card" th:classappend="${!tour.active} ? ' inactive' : ''">
                <img th:if="${tour.imageUrl != null}" th:src="${tour.imageUrl}" alt="투어 이미지">
                <div th:if="${tour.imageUrl == null}" class="no-img">📷 이미지 없음</div>
                <div class="info">
                    <h3 th:text="${tour.name}">투어명</h3>
                    <p class="price" th:text="'₩' + ${#numbers.formatInteger(tour.minPrice, 0, 'COMMA')} + ' ~ ₩' + ${#numbers.formatInteger(tour.maxPrice, 0, 'COMMA')}">가격</p>
                    <p style="color:#aaa; font-size:0.85rem; margin-top:0.3rem;" th:text="${tour.days} + '일 | ' + ${tour.active ? '활성' : '비활성'}">5일</p>
                    <div class="actions">
                        <a th:href="@{/admin/tours/{id}(id=${tour.id})}" class="btn-edit">편집</a>
                        <form th:action="@{/admin/tours/{id}/toggle(id=${tour.id})}" method="post" style="display:inline;">
                            <button type="submit" class="btn-toggle" th:text="${tour.active} ? '비활성' : '활성화'">비활성</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
