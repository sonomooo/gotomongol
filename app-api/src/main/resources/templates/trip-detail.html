<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${trip.tourName} + ' - 고투몽골'">여행 일정</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background: #f9f9f9; padding: 2rem 1rem; }
        .container { max-width: 700px; margin: 0 auto; background: white; border-radius: 16px; padding: 2.5rem; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        h1 { color: #ff6b35; margin-bottom: 0.5rem; }
        .meta { color: #666; margin-bottom: 2rem; line-height: 1.8; }
        .schedule { white-space: pre-wrap; line-height: 1.8; font-size: 0.95rem; background: #fafafa; padding: 1.5rem; border-radius: 8px; border: 1px solid #eee; }
        .meeting { background: #fff3ed; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; }
        .meeting strong { color: #ff6b35; }
        .actions { display: flex; gap: 0.8rem; margin-top: 2rem; flex-wrap: wrap; }
        .actions a, .actions button { padding: 0.7rem 1.2rem; border-radius: 8px; font-size: 0.9rem; font-weight: bold; text-decoration: none; cursor: pointer; border: none; }
        .btn-primary { background: #ff6b35; color: white; }
        .btn-secondary { background: #eee; color: #333; }
        @media print {
            body { background: white; padding: 0; }
            .container { box-shadow: none; padding: 1rem; }
            .actions { display: none; }
            .nav { display: none; }
        }
        @media (max-width: 768px) {
            .container { margin: 1rem; padding: 1.5rem; }
            .actions { flex-direction: column; }
        }
        .nav { margin-bottom: 1.5rem; }
        .nav a { color: #666; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav"><a href="/my/trips">← 내 여행 목록</a></div>

        <h1 th:text="${trip.tourName}">홉스골 프리미엄</h1>
        <div class="meta">
            <p>📅 <span th:text="${trip.startDate} + ' ~ ' + ${trip.endDate}">2026-07-10 ~ 2026-07-16</span></p>
            <p>📍 <span th:text="${trip.spots}">홉스골, 온천, 초원</span></p>
            <p>👥 <span th:text="${trip.groupSize} + '명'">4명</span></p>
        </div>

        <div class="meeting" th:if="${trip.meetingInfo != null}">
            <strong>📌 집결 안내</strong>
            <p th:text="${trip.meetingInfo}">울란바토르 공항 1층 로비, 오전 9시</p>
        </div>

        <h2 style="margin-bottom:1rem;">📋 일자별 일정</h2>
        <div class="schedule" th:text="${trip.dailySchedule}">
            1일차: 울란바토르 → 테를지 이동
            2일차: 승마 체험 + 게르 숙박
            ...
        </div>

        <div class="actions">
            <a th:href="@{/my/trips/{id}/calendar(id=${trip.id})}" class="btn-primary">📱 캘린더에 저장</a>
            <button class="btn-secondary" onclick="window.print()">🖨️ 프린트</button>
        </div>

        <div th:if="${quote != null}" style="margin-top:2rem; background:#f0f0f0; padding:1.5rem; border-radius:8px;">
            <h2 style="margin-bottom:1rem;">📄 견적서</h2>
            <table style="width:100%; font-size:0.9rem; line-height:2;">
                <tr><td style="color:#666;">여행 일수</td><td th:text="${quote.days} + '일'">5일</td></tr>
                <tr><td style="color:#666;">인원</td><td th:text="${quote.groupSize} + '명'">2명</td></tr>
                <tr><td style="color:#666;">숙소 등급</td><td th:text="${quote.accommodationType}">CAMP</td></tr>
                <tr><td style="color:#666;">방문지</td><td th:text="${#strings.listJoin(quote.spots, ', ')}">홉스골</td></tr>
                <tr><td style="color:#666;">액티비티</td><td th:text="${#strings.listJoin(quote.activities, ', ')}">승마</td></tr>
                <tr th:if="${quote.memo != null}"><td style="color:#666;">요청사항</td><td th:text="${quote.memo}">메모</td></tr>
            </table>
        </div>
    </div>
</body>
</html>
