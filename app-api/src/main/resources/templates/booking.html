<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예약하기 - 고투몽골</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background: #f9f9f9; padding: 2rem 1rem; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 0.5rem; }
        .sub { text-align: center; color: #666; margin-bottom: 2rem; }
        .calendar-wrap { background: white; border-radius: 16px; padding: 2rem; box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-bottom: 2rem; }
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .cal-header h2 { font-size: 1.3rem; }
        .cal-header button { background: none; border: 1px solid #ddd; border-radius: 8px; padding: 0.5rem 1rem; cursor: pointer; font-size: 1rem; }
        .cal-header button:hover { background: #f0f0f0; }
        .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-weight: bold; color: #666; font-size: 0.85rem; margin-bottom: 0.5rem; }
        .days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; font-size: 0.95rem; position: relative; }
        .day:hover:not(.disabled):not(.booked) { background: #fff3ed; }
        .day.today { border: 2px solid #ff6b35; }
        .day.selected { background: #ff6b35; color: white; }
        .day.range { background: #ffe8dd; }
        .day.booked { background: #fee2e2; color: #dc2626; cursor: not-allowed; text-decoration: line-through; }
        .day.disabled { color: #ccc; cursor: default; }
        .day.empty { cursor: default; }
        .legend { display: flex; gap: 1.5rem; justify-content: center; margin-top: 1rem; font-size: 0.85rem; color: #666; }
        .legend span { display: flex; align-items: center; gap: 0.3rem; }
        .legend .dot { width: 12px; height: 12px; border-radius: 3px; }
        .dot-booked { background: #fee2e2; border: 1px solid #dc2626; }
        .dot-selected { background: #ff6b35; }
        .dot-range { background: #ffe8dd; }

        .booking-form { background: white; border-radius: 16px; padding: 2rem; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .booking-form h2 { margin-bottom: 1.5rem; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 0.4rem; font-size: 0.9rem; }
        .form-group input, .form-group select { width: 100%; padding: 0.7rem; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
        .selected-dates { background: #f0f0f0; padding: 0.8rem 1rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.9rem; }
        .btn { width: 100%; padding: 1rem; background: #ff6b35; color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        .btn:hover { background: #e55a2b; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        a.back { color: #666; text-decoration: none; display: block; text-align: center; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📅 예약하기</h1>
        <p class="sub">출발일과 종료일을 선택하세요. 빨간 날짜는 예약 불가입니다.</p>

        <div class="calendar-wrap">
            <div class="cal-header">
                <button onclick="prevMonth()">◀</button>
                <h2 id="monthTitle">2026년 7월</h2>
                <button onclick="nextMonth()">▶</button>
            </div>
            <div class="weekdays"><span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span></div>
            <div class="days" id="calendarDays"></div>
            <div class="legend">
                <span><span class="dot dot-selected"></span> 선택</span>
                <span><span class="dot dot-range"></span> 여행 기간</span>
                <span><span class="dot dot-booked"></span> 예약 불가</span>
            </div>
        </div>

        <div class="booking-form">
            <h2>예약 정보</h2>
            <div class="selected-dates" id="selectedDates">날짜를 선택해주세요 (출발일 → 종료일 순서로 클릭)</div>
            <div class="form-row">
                <div class="form-group">
                    <label>이름 *</label>
                    <input type="text" id="bName" placeholder="홍길동">
                </div>
                <div class="form-group">
                    <label>핸드폰 *</label>
                    <input type="tel" id="bPhone" placeholder="010-0000-0000">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>인원 *</label>
                    <select id="bGroupSize">
                        <option value="2">2명</option>
                        <option value="3">3명</option>
                        <option value="4">4명</option>
                        <option value="5">5명</option>
                        <option value="6">6명 이상</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>투어 코스</label>
                    <select id="bTour">
                        <option value="초원 힐링 코스">초원 힐링 코스</option>
                        <option value="고비사막 어드벤처">고비사막 어드벤처</option>
                        <option value="홉스골 프리미엄">홉스골 프리미엄</option>
                        <option value="몽골 완전정복">몽골 완전정복</option>
                        <option value="커스텀">커스텀 (상담 후 결정)</option>
                    </select>
                </div>
            </div>
            <button class="btn" id="submitBtn" onclick="submitBooking()" disabled>예약 신청하기</button>
        </div>
        <a href="/" class="back">← 홈으로</a>
    </div>

    <script>
        let currentYear = 2026, currentMonth = new Date().getMonth();
        let startDate = null, endDate = null;
        let bookedDates = new Set();

        // 현재 연도 설정
        const now = new Date();
        currentYear = now.getFullYear();
        currentMonth = now.getMonth();

        async function loadBookedDates() {
            const from = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-01`;
            const lastDay = new Date(currentYear, currentMonth+1, 0).getDate();
            const to = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${lastDay}`;
            const res = await fetch(`/api/bookings/unavailable?from=${from}&to=${to}`);
            const dates = await res.json();
            bookedDates = new Set(dates);
            renderCalendar();
        }

        function renderCalendar() {
            const title = `${currentYear}년 ${currentMonth + 1}월`;
            document.getElementById('monthTitle').textContent = title;

            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();
            const today = new Date();

            let html = '';
            for (let i = 0; i < firstDay; i++) html += '<div class="day empty"></div>';

            for (let d = 1; d <= lastDate; d++) {
                const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const dateObj = new Date(currentYear, currentMonth, d);
                const isPast = dateObj < new Date(today.getFullYear(), today.getMonth(), today.getDate());
                const isBooked = bookedDates.has(dateStr);
                const isToday = dateObj.toDateString() === today.toDateString();
                const isStart = startDate === dateStr;
                const isEnd = endDate === dateStr;
                const inRange = startDate && endDate && dateStr > startDate && dateStr < endDate;

                let cls = 'day';
                if (isPast) cls += ' disabled';
                else if (isBooked) cls += ' booked';
                else if (isStart || isEnd) cls += ' selected';
                else if (inRange) cls += ' range';
                if (isToday) cls += ' today';

                const clickable = !isPast && !isBooked;
                html += `<div class="${cls}" ${clickable ? `onclick="selectDate('${dateStr}')"` : ''}>${d}</div>`;
            }
            document.getElementById('calendarDays').innerHTML = html;
        }

        function selectDate(dateStr) {
            if (!startDate || (startDate && endDate)) {
                startDate = dateStr; endDate = null;
            } else {
                if (dateStr < startDate) { endDate = startDate; startDate = dateStr; }
                else { endDate = dateStr; }
                // 범위 내 예약 불가 날짜 체크
                if (hasBookedInRange(startDate, endDate)) {
                    alert('선택한 기간에 예약 불가 날짜가 포함되어 있습니다.');
                    startDate = null; endDate = null;
                }
            }
            updateUI();
            renderCalendar();
        }

        function hasBookedInRange(s, e) {
            for (const d of bookedDates) { if (d >= s && d <= e) return true; }
            return false;
        }

        function updateUI() {
            const el = document.getElementById('selectedDates');
            const btn = document.getElementById('submitBtn');
            if (startDate && endDate) {
                el.textContent = `📅 ${startDate} ~ ${endDate} (${daysBetween(startDate, endDate)}박${daysBetween(startDate, endDate)+1}일)`;
                btn.disabled = false;
            } else if (startDate) {
                el.textContent = `📅 출발일: ${startDate} (종료일을 선택하세요)`;
                btn.disabled = true;
            } else {
                el.textContent = '날짜를 선택해주세요 (출발일 → 종료일 순서로 클릭)';
                btn.disabled = true;
            }
        }

        function daysBetween(a, b) { return Math.round((new Date(b) - new Date(a)) / 86400000); }

        function prevMonth() {
            currentMonth--;
            if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            loadBookedDates();
        }
        function nextMonth() {
            currentMonth++;
            if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            loadBookedDates();
        }

        async function submitBooking() {
            const body = {
                customerName: document.getElementById('bName').value,
                phone: document.getElementById('bPhone').value,
                startDate, endDate,
                groupSize: parseInt(document.getElementById('bGroupSize').value),
                tourName: document.getElementById('bTour').value
            };
            if (!body.customerName || !body.phone) { alert('이름과 핸드폰을 입력해주세요.'); return; }

            const res = await fetch('/api/bookings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            if (res.ok) { window.location.href = '/booking/complete'; }
            else { alert('예약에 실패했습니다. 다시 시도해주세요.'); }
        }

        loadBookedDates();
    </script>
</body>
</html>
