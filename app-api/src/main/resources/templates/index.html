<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>몽골 커스텀 투어</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; color: #333; }
        .hero { height: 70vh; background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('/images/hero.jpg') center/cover; display: flex; align-items: center; justify-content: center; text-align: center; color: white; }
        .hero h1 { font-size: 2.5rem; margin-bottom: 1rem; }
        .hero p { font-size: 1.2rem; margin-bottom: 2rem; }
        .btn { display: inline-block; padding: 1rem 2rem; background: #ff6b35; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; }
        .btn:hover { background: #e55a2b; }
        .section { max-width: 1200px; margin: 4rem auto; padding: 0 1rem; }
        .section h2 { font-size: 1.8rem; margin-bottom: 2rem; text-align: center; }
        .tour-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2rem; }
        .tour-card { border: 1px solid #eee; border-radius: 12px; overflow: hidden; transition: transform 0.2s; }
        .tour-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        .tour-card .info { padding: 1.5rem; }
        .tour-card h3 { margin-bottom: 0.5rem; }
        .tour-card .price { color: #ff6b35; font-weight: bold; font-size: 1.1rem; }
        .tour-card .days { color: #666; font-size: 0.9rem; }
        .tour-card a { text-decoration: none; color: inherit; }
        @media (max-width: 768px) {
            nav { padding: 0.8rem 1rem !important; }
            nav div { gap: 1rem !important; font-size: 0.85rem !important; }
            .hero h1 { font-size: 1.6rem; }
            .hero p { font-size: 1rem; }
            .hero { height: 50vh; }
            .section { margin: 2rem auto; }
            .tour-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav style="display:flex; justify-content:space-between; align-items:center; padding:1rem 2rem; background:white; box-shadow:0 1px 4px rgba(0,0,0,0.06);">
        <a href="/" style="font-weight:bold; font-size:1.2rem; color:#ff6b35; text-decoration:none;">🇲🇳 고투몽골</a>
        <div style="display:flex; gap:1.5rem; font-size:0.95rem;">
            <a href="/custom" style="color:#333; text-decoration:none;">견적 요청</a>
            <a href="/my/trips" style="color:#333; text-decoration:none;">내 여행</a>
            <a href="/login" style="color:#ff6b35; text-decoration:none; font-weight:bold;">로그인</a>
        </div>
    </nav>

    <div class="hero" th:style="'height:70vh; background:linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.4))' + (${site['heroImage'] != null} ? ',url(' + ${site['heroImage']} + ')' : '') + ' center/cover; display:flex; align-items:center; justify-content:center; text-align:center; color:white;'">
        <div>
            <h1 th:text="${site['slogan'] ?: '나만의 몽골 여행을 설계하세요'}">나만의 몽골 여행을 설계하세요</h1>
            <p th:text="${site['subText'] ?: '정해진 코스 없이, 원하는 곳만 골라 떠나는 프라이빗 투어'}">정해진 코스 없이, 원하는 곳만 골라 떠나는 프라이빗 투어</p>
            <a href="/custom" class="btn">커스텀 투어 만들기 →</a>
        </div>
    </div>

    <div class="section">
        <h2>추천 코스</h2>
        <div class="tour-grid">
            <div class="tour-card" th:each="tour : ${tours}">
                <a th:href="@{/tours/{id}(id=${tour.id})}">
                    <img th:if="${tour.imageUrl != null}" th:src="${tour.imageUrl}" style="width:100%; height:180px; object-fit:cover; border-radius:12px 12px 0 0;">
                    <div th:if="${tour.imageUrl == null}" style="width:100%; height:180px; background:#f0f0f0; border-radius:12px 12px 0 0; display:flex; align-items:center; justify-content:center; color:#999;">📷</div>
                    <div class="info">
                        <h3 th:text="${tour.name}">투어명</h3>
                        <p class="days" th:text="${tour.days} + '박' + (${tour.days} + 1) + '일'">4박5일</p>
                        <p class="price" th:text="'₩' + ${#numbers.formatInteger(tour.minPrice, 0, 'COMMA')} + ' ~'">₩800,000 ~</p>
                        <p th:text="${tour.description}" style="margin-top:0.5rem; color:#666; font-size:0.9rem;">설명</p>
                    </div>
                </a>
            </div>
        </div>
        <p style="text-align:center; margin-top:2rem; color:#666;">모든 추천 코스는 커스텀 변경 가능합니다</p>
    </div>
</body>
</html>
